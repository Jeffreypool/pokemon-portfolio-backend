<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      letter-spacing: 2px;
      margin-bottom: 60px;
      color: #d4af37;
    }

    .hero-number {
      font-size: 56px;
      font-weight: 700;
      transition: all 0.4s ease;
    }

    .gold-glow {
      text-shadow: 0 0 20px rgba(212,175,55,0.8);
    }

    .roi {
      font-size: 22px;
      margin-top: 10px;
    }

    .section {
      margin-bottom: 50px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    canvas {
      max-height: 200px !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      opacity: 0.9;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
    }

    tr:hover {
      background: rgba(212,175,55,0.05);
    }

    input, select {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }

    .manage-toggle {
      margin-top: 40px;
      cursor: pointer;
      font-size: 14px;
      color: #d4af37;
    }

    .manage-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease;
    }

    .manage-section.open {
      max-height: 4000px;
      margin-top: 40px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid #333;
    }

    .badge.gold { color: #d4af37; border-color: #d4af37; }
    .badge.green { color: #4ade80; border-color: #4ade80; }
    .badge.red { color: #f87171; border-color: #f87171; }

  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="section">
  <div>Total Portfolio Value</div>
  <div id="portfolioValue" class="hero-number"></div>
  <div id="roiDisplay" class="roi"></div>

  <div style="margin-top:25px;">
    <div style="font-size:14px; opacity:0.6;">Investment Rating</div>
    <div id="portfolioScore" style="font-size:32px; margin-top:5px;"></div>
    <canvas id="scoreChart" height="120"></canvas>
  </div>
</div>

<div class="section card">
  <canvas id="valueChart"></canvas>
</div>

<div class="section card">
  <canvas id="growthChart"></canvas>
</div>

<div class="section card">
  <h3>Top Performing Asset</h3>
  <div id="topAsset"></div>
</div>

<div class="manage-toggle" onclick="toggleManage()">
  ⚙ Manage Portfolio
</div>

<div id="manageSection" class="manage-section">

  <div class="card">
    <h3>Add Item</h3>
    <form id="itemForm">
      <input id="name" placeholder="Name" required />
      <input id="set" placeholder="Set" />
      <input id="condition" placeholder="Condition" />
      <input id="quantity" type="number" value="1" required />
      <input id="purchase_price" type="number" placeholder="Purchase €" required />
      <input id="current_price" type="number" placeholder="Current €" required />
      <select id="product_type">
        <option>Booster Box</option>
        <option>ETB</option>
        <option>Loose Pack</option>
        <option>Single Card</option>
      </select>
      <button>Add</button>
    </form>
  </div>

  <div class="card">
    <h3>Portfolio Table</h3>
    <table>
      <thead>
        <tr>
          <th>Asset</th>
          <th>Type</th>
          <th>Investment</th>
          <th>Current</th>
          <th>Profit</th>
          <th>ROI</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
  </div>

</div>

<script>

let allItems = []
let valueChart, growthChart, scoreChart

function toggleManage(){
  document.getElementById("manageSection").classList.toggle("open")
}

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  render(allItems)
}

function animateNumber(el,target){
  let start=0
  const step=target/60
  function update(){
    start+=step
    if(start>=target){
      el.innerHTML="€ "+target.toLocaleString()
      return
    }
    el.innerHTML="€ "+Math.floor(start).toLocaleString()
    requestAnimationFrame(update)
  }
  update()
}

function render(items){

  const invest = items.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = items.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const profit = current-invest
  const roi = ((profit/invest)*100)

  animateNumber(document.getElementById("portfolioValue"),current)

  document.getElementById("roiDisplay").innerHTML =
    `<span class="${profit>=0?'green':'red'}">ROI ${roi.toFixed(2)}%</span>`

  const score = Math.min(100, Math.max(0, Math.round(roi)))
  document.getElementById("portfolioScore").innerHTML = `${score} / 100`

  renderScoreChart(score)
  renderCharts(invest,current)
  renderTop(items)
  renderTable(items)
}

function renderScoreChart(score){
  if(scoreChart) scoreChart.destroy()

  scoreChart = new Chart(document.getElementById("scoreChart"),{
    type:"doughnut",
    data:{
      labels:["Score","Remaining"],
      datasets:[{
        data:[score,100-score],
        backgroundColor:["#d4af37","#333"],
        circumference:180,
        rotation:270
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      cutout:"75%"
    }
  })
}

function renderCharts(invest,current){

  if(valueChart)valueChart.destroy()
  valueChart=new Chart(document.getElementById("valueChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })

  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
  const growth=months.map((m,i)=> invest+((current-invest)/12)*i)

  if(growthChart)growthChart.destroy()
  growthChart=new Chart(document.getElementById("growthChart"),{
    type:"line",
    data:{labels:months,datasets:[{data:growth,borderColor:"#d4af37",tension:0.3}]},
    options:{plugins:{legend:{display:false}}}
  })
}

function renderTop(items){
  let best=null, bestROI=-999
  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=(profit/(i.purchase_price*i.quantity))*100
    if(roi>bestROI){bestROI=roi;best=i}
  })
  if(!best)return
  document.getElementById("topAsset").innerHTML=
    `${best.name} <span class="badge gold">${bestROI.toFixed(1)}% ROI</span>`
}

function renderTable(items){
  const tbody=document.getElementById("itemsBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=((profit/(i.purchase_price*i.quantity))*100).toFixed(1)

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||""}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td><span class="badge ${roi>150?'gold':roi>0?'green':'red'}">
          ${roi}%</span></td>
        <td><button onclick="deleteItem('${i.id}')">❌</button></td>
      </tr>
    `
  })
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()
  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:name.value,
      set_name:set.value,
      condition:condition.value,
      quantity:Number(quantity.value),
      purchase_price:Number(purchase_price.value),
      current_price:Number(current_price.value),
      product_type:product_type.value
    })
  })
  e.target.reset()
  loadData()
})

loadData()
</script>

</body>
</html>
