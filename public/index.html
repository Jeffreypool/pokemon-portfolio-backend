<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 50px 60px;
      background: radial-gradient(circle at top, #11151c, #0b0e13 70%);
      font-family: Inter, sans-serif;
      color: #e5e7eb;
    }

    h1 {
      text-align:center;
      letter-spacing:2px;
      opacity:0.8;
      margin-bottom:40px;
    }

    .hero {
      text-align:center;
      margin-bottom:50px;
    }

    .hero-value {
      font-size:64px;
      font-weight:700;
      color:#22c55e;
      text-shadow:
        0 0 8px rgba(34,197,94,0.6),
        0 0 20px rgba(34,197,94,0.4);
    }

    .hero-sub {
      margin-top:12px;
      font-size:16px;
      opacity:0.7;
    }

    .kpi-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .kpi-card {
      background:#161a22;
      border:1px solid #1f2937;
      border-radius:12px;
      padding:20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    .kpi-title {
      font-size:13px;
      opacity:0.6;
      margin-bottom:8px;
    }

    .kpi-value {
      font-size:22px;
      font-weight:600;
    }

    .kpi-sub {
      margin-top:8px;
      font-size:14px;
    }

    .chart-grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:25px;
      margin-bottom:40px;
    }

    .card {
      background:#161a22;
      padding:20px;
      border-radius:12px;
      border:1px solid #1f2937;
      margin-bottom:25px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      padding:10px 8px;
      border-bottom:1px solid #1f2937;
    }

    th { color:#9ca3af; }

    .right { text-align:right; }
    .center { text-align:center; }

    input, select {
      padding:6px 8px;
      background:#0f1115;
      color:#e5e7eb;
      border:1px solid #2a3240;
      border-radius:6px;
      margin-right:8px;
      margin-bottom:8px;
    }

    button {
      padding:6px 10px;
      border-radius:6px;
      border:none;
      background:#d4af37;
      color:black;
      font-weight:600;
      cursor:pointer;
    }

    .green { color:#22c55e; }
    .red { color:#ef4444; }

    canvas { max-height:170px !important; }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="hero">
  <div id="totalValueHero" class="hero-value"></div>
  <div id="heroSubline" class="hero-sub"></div>
</div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-title">Active Holdings</div>
    <div id="activeValueKPI" class="kpi-value"></div>
    <div id="activeProfitKPI" class="kpi-sub"></div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Realized Gains</div>
    <div id="realizedValueKPI" class="kpi-value"></div>
    <div id="realizedProfitKPI" class="kpi-sub"></div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Total Performance</div>
    <div id="totalROIKPI" class="kpi-value"></div>
    <div id="totalProfitKPI" class="kpi-sub"></div>
  </div>
</div>

<div class="chart-grid">
  <div class="card">
    <canvas id="barChart"></canvas>
  </div>
  <div class="card">
    <canvas id="lineChart"></canvas>
  </div>
</div>

<div class="card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input list="productList" id="product_type" placeholder="Product Type" />
    <datalist id="productList"></datalist>
    <button>Add</button>
  </form>
</div>

<div class="card">
  <h3>Filter</h3>
  <select id="filterType">
    <option value="all">All</option>
  </select>
</div>

<div class="card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="center">Qty</th>
        <th class="right">Investment</th>
        <th class="right">Current</th>
        <th class="right">Profit</th>
        <th class="center">Sell</th>
        <th class="center">Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="right">Sold Price</th>
        <th class="right">Investment</th>
        <th class="right">Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let allItems = []
let barChart, lineChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  populateTypes()
  render()
}

function populateTypes(){
  const types = [...new Set(allItems.map(i=>i.product_type).filter(Boolean))]
  const filter = document.getElementById("filterType")
  const list = document.getElementById("productList")

  filter.innerHTML = '<option value="all">All</option>'
  list.innerHTML = ""

  types.forEach(t=>{
    filter.innerHTML += `<option value="${t}">${t}</option>`
    list.innerHTML += `<option value="${t}">`
  })
}

function render(){
  const filter = document.getElementById("filterType").value
  const items = filter==="all" ? allItems : allItems.filter(i=>i.product_type===filter)
  const active = items.filter(i=>!i.sold)
  const sold = items.filter(i=>i.sold)

  renderStats(active,sold)
  renderTables(active,sold)
  renderBarChart(active)
}

function renderStats(active,sold){
  const invest = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = current-invest
  const realized = sold.reduce((s,i)=>s+((i.sold_price-i.purchase_price)*i.quantity),0)
  const totalProfit = unrealized + realized
  const totalROI = invest>0 ? ((totalProfit/invest)*100).toFixed(2) : 0
  const soldValue = sold.reduce((s,i)=>s+(i.sold_price*i.quantity),0)

  document.getElementById("totalValueHero").innerHTML = "€ " + current.toLocaleString()
  document.getElementById("heroSubline").innerHTML =
    `<span class="${totalProfit>=0?'green':'red'}">€ ${totalProfit.toLocaleString()}</span> • ${totalROI}% ROI`

  document.getElementById("activeValueKPI").innerHTML = "€ " + current.toLocaleString()
  document.getElementById("activeProfitKPI").innerHTML =
    `<span class="${unrealized>=0?'green':'red'}">€ ${unrealized.toLocaleString()}</span>`

  document.getElementById("realizedValueKPI").innerHTML = "€ " + soldValue.toLocaleString()
  document.getElementById("realizedProfitKPI").innerHTML =
    `<span class="${realized>=0?'green':'red'}">€ ${realized.toLocaleString()}</span>`

  document.getElementById("totalROIKPI").innerHTML = totalROI + "%"
  document.getElementById("totalProfitKPI").innerHTML =
    `<span class="${totalProfit>=0?'green':'red'}">€ ${totalProfit.toLocaleString()}</span>`
}

loadData()

</script>

</body>
</html>
