<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 50px 60px;
      background: #0f1115;
      font-family: Inter, sans-serif;
      color: #e5e7eb;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #f3f4f6;
    }

    .card {
      background: #161a22;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      margin-bottom: 25px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #1f2937;
    }

    th { color: #9ca3af; cursor: pointer; }

    .right { text-align: right; }
    .center { text-align: center; }

    input, select {
      padding: 6px 8px;
      background: #0f1115;
      color: #e5e7eb;
      border: 1px solid #2a3240;
      border-radius: 6px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #d4af37;
      color: black;
      font-weight: 600;
      cursor: pointer;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    canvas { max-height: 170px !important; }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:flex-start;">

    <div>
      <div style="font-size:13px; opacity:0.6;">Active Portfolio Value</div>
      <div id="totalValue" style="font-size:32px; margin-top:6px;"></div>
    </div>

    <div style="text-align:right;">
      <div style="font-size:13px; opacity:0.6;">Total Sold Value</div>
      <div id="totalSoldValue" style="font-size:24px; margin-top:6px;"></div>
    </div>

  </div>

  <div style="margin-top:18px;">
    <div id="totalProfit"></div>
    <div id="totalROI"></div>
  </div>
</div>

<div class="card">
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input list="productList" id="product_type" placeholder="Product Type" />
    <datalist id="productList"></datalist>
    <button>Add</button>
  </form>
</div>

<div class="card">
  <h3>Filter</h3>
  <select id="filterType">
    <option value="all">All</option>
  </select>
</div>

<div class="card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="center">Qty</th>
        <th class="right">Investment</th>
        <th class="right">Current</th>
        <th class="right">Profit</th>
        <th class="center">Sell</th>
        <th class="center">Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="right">Sold Price</th>
        <th class="right">Investment</th>
        <th class="right">Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let allItems = []
let barChart, lineChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  populateTypes()
  render()
}

function populateTypes(){
  const types = [...new Set(allItems.map(i=>i.product_type).filter(Boolean))]
  const filter = document.getElementById("filterType")
  const list = document.getElementById("productList")

  filter.innerHTML = '<option value="all">All</option>'
  list.innerHTML = ""

  types.forEach(t=>{
    filter.innerHTML += `<option value="${t}">${t}</option>`
    list.innerHTML += `<option value="${t}">`
  })
}

function render(){

  const filter = document.getElementById("filterType").value

  const items = filter==="all"
    ? allItems
    : allItems.filter(i=>i.product_type===filter)

  const active = items.filter(i=>!i.sold)

  // sold voor stats (gefilterd)
  const soldFiltered = items.filter(i=>i.sold)

  // sold voor tabel (altijd volledig)
  const soldAll = allItems.filter(i=>i.sold)

  renderStats(active, soldFiltered)
  renderTables(active, soldAll)
  renderBarChart(active)
  loadPriceHistoryChart()
}

function renderStats(active,sold){
  const invest = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = current-invest
  const realized = sold.reduce((s,i)=>s+((i.sold_price-i.purchase_price)*i.quantity),0)
  const totalProfit = unrealized + realized
  const totalROI = invest>0 ? ((totalProfit/invest)*100).toFixed(2) : 0

  document.getElementById("totalSoldValue").innerHTML =
  "€ " + totalSoldValue.toLocaleString()
  document.getElementById("totalValue").innerHTML = "€ "+current.toLocaleString()
  document.getElementById("totalProfit").innerHTML =
    `<span class="${totalProfit>=0?'green':'red'}">€ ${totalProfit.toLocaleString()}</span>`
  document.getElementById("totalROI").innerHTML =
    `<span class="${totalROI>=0?'green':'red'}">${totalROI}% ROI</span>`
}

function renderTables(active,sold){
  const body=document.getElementById("activeBody")
  body.innerHTML=""

  active.forEach(i=>{
    const totalInvest = i.purchase_price * i.quantity
    const totalCurrent = i.current_price * i.quantity
    const profit = totalCurrent - totalInvest

    body.innerHTML += `
      <tr>
        <td>${i.name}</td>
        <td class="center">
          <button onclick="changeQty('${i.id}', -1)">−</button>
          <span style="margin:0 8px;">${i.quantity}</span>
          <button onclick="changeQty('${i.id}', 1)">+</button>
        </td>
        <td class="right">€ ${totalInvest.toLocaleString()}</td>
        <td class="right editable" data-id="${i.id}" data-value="${i.current_price}">
          € ${totalCurrent.toLocaleString()}
        </td>
        <td class="right ${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td class="center"><button onclick="sellItem('${i.id}')">💰</button></td>
        <td class="center"><button onclick="deleteItem('${i.id}')">❌</button></td>
      </tr>
    `
  })

  enableInlineEdit()

  const soldBody=document.getElementById("soldBody")
  soldBody.innerHTML=""

  sold.forEach(i=>{
    const realized=(i.sold_price-i.purchase_price)*i.quantity

    soldBody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td class="right">€ ${i.sold_price}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right ${realized>=0?'green':'red'}">
          € ${realized.toLocaleString()}
        </td>
        <td>${i.sold_date ? i.sold_date.split("T")[0] : ""}</td>
      </tr>
    `
  })
}

function enableInlineEdit(){
  document.querySelectorAll(".editable").forEach(cell=>{
    cell.onclick = function(){
      const id=this.dataset.id
      const oldValue=this.dataset.value
      this.innerHTML=`<input type="number" value="${oldValue}" style="width:80px;">`
      const input=this.querySelector("input")
      input.focus()

      input.onblur=async ()=>{
        const newValue=Number(input.value)
        await fetch('/api/update-item',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id,current_price:newValue})
        })
        loadData()
      }
    }
  })
}

function renderBarChart(active){
  const invest=active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current=active.reduce((s,i)=>s+i.current_price*i.quantity,0)

  if(barChart) barChart.destroy()

  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{labels:["Investment","Current"],datasets:[{data:[invest,current],backgroundColor:["#444","#d4af37"]}]},
    options:{plugins:{legend:{display:false}}}
  })
}

async function loadPriceHistoryChart(){

  const res = await fetch('/api/price-history')
  const history = await res.json()

  // Stap 1: sorteer chronologisch
  history.sort((a,b)=>new Date(a.recorded_at)-new Date(b.recorded_at))

  const monthly = {}

  history.forEach(row=>{
    const date = new Date(row.recorded_at)
    const monthKey = date.getFullYear() + "-" + String(date.getMonth()+1).padStart(2,'0')

    if(!monthly[monthKey]){
      monthly[monthKey] = {}
    }

    // Per item laatste waarde in die maand bewaren
    monthly[monthKey][row.item_id] = Number(row.market_value)
  })

  const months = Object.keys(monthly).sort()
  const values = []

  let lastKnownValues = {}

  months.forEach(month=>{
    // update last known per item
    Object.keys(monthly[month]).forEach(itemId=>{
      lastKnownValues[itemId] = monthly[month][itemId]
    })

    // totaal portfolio waarde in die maand
    const total = Object.values(lastKnownValues).reduce((sum,v)=>sum+v,0)
    values.push(total)
  })

  if(lineChart) lineChart.destroy()

  lineChart = new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels: months,
      datasets:[{
        label:"Portfolio Value",
        data: values,
        borderColor:"#22c55e",
        tension:0.3
      }]
    },
    options:{
      plugins:{ legend:{ display:false }},
      scales:{
        x:{ ticks:{ color:"#888" }},
        y:{ ticks:{ color:"#888" }}
      }
    }
  })
}

async function changeQty(id, delta){
  const item = allItems.find(i=>i.id===id)
  if(!item) return
  const newQty=item.quantity+delta
  if(newQty<1) return

  await fetch('/api/update-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:id,
      quantity:newQty,
      purchase_price:item.purchase_price,
      current_price:item.current_price,
      product_type:item.product_type
    })
  })
  loadData()
}

async function sellItem(id){
  const soldPrice=prompt("Enter selling price:")
  if(!soldPrice) return
  await fetch('/api/sell-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id,sold_price:Number(soldPrice)})
  })
  loadData()
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()
  const body={
    name:document.getElementById("name").value,
    quantity:Number(document.getElementById("quantity").value),
    purchase_price:Number(document.getElementById("purchase_price").value),
    current_price:Number(document.getElementById("current_price").value),
    product_type:document.getElementById("product_type").value,
    purchase_date:new Date().toISOString()
  }
  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })
  e.target.reset()
  loadData()
})

document.getElementById("filterType").addEventListener("change",render)

loadData()

</script>

</body>
</html>
