<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #d4af37;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
    }

    .stat-title {
      font-size: 14px;
      opacity: 0.6;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .section { margin-bottom: 40px; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    canvas { max-height: 220px !important; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th { color: #aaa; }

    input {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="stats">
  <div class="stat-card">
    <div class="stat-title">Active Portfolio Value</div>
    <div id="activeValue" class="stat-value"></div>
  </div>

  <div class="stat-card">
    <div class="stat-title">Unrealized Profit</div>
    <div id="unrealizedProfit" class="stat-value"></div>
  </div>

  <div class="stat-card">
    <div class="stat-title">Realized Profit</div>
    <div id="realizedProfit" class="stat-value"></div>
  </div>
</div>

<div class="section card">
  <h3>Current vs Investment</h3>
  <canvas id="barChart"></canvas>
</div>

<div class="section card">
  <h3>Portfolio Growth Timeline</h3>
  <canvas id="timelineChart"></canvas>
</div>

<div class="section card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Qty</th>
        <th>Investment</th>
        <th>Current</th>
        <th>Profit</th>
        <th>Sell</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="section card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Sold Price</th>
        <th>Investment</th>
        <th>Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let barChart
let timelineChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  const active = data.items.filter(i => !i.sold)
  const sold = data.items.filter(i => i.sold)

  render(active, sold)
}

function render(active, sold){

  const investActive = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const currentActive = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = currentActive - investActive

  const realized = sold.reduce((s,i)=>{
    return s + ((i.sold_price - i.purchase_price) * i.quantity)
  },0)

  document.getElementById("activeValue").innerHTML =
    "€ " + currentActive.toLocaleString()

  document.getElementById("unrealizedProfit").innerHTML =
    `<span class="${unrealized>=0?'green':'red'}">
      € ${unrealized.toLocaleString()}
    </span>`

  document.getElementById("realizedProfit").innerHTML =
    `<span class="${realized>=0?'green':'red'}">
      € ${realized.toLocaleString()}
    </span>`

  renderBarChart(investActive,currentActive)
  renderTimeline([...active,...sold])

  renderActiveTable(active)
  renderSoldTable(sold)
}

function renderBarChart(invest,current){
  if(barChart) barChart.destroy()

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current Value"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })
}

function renderTimeline(items){

  const events = []

  items.forEach(item=>{
    const invest = item.purchase_price * item.quantity

    if(item.purchase_date){
      events.push({
        date: new Date(item.purchase_date),
        profitChange: -invest,
        valueChange: invest
      })
    }

    if(item.sold && item.sold_date){
      const realized = (item.sold_price - item.purchase_price) * item.quantity
      events.push({
        date: new Date(item.sold_date),
        profitChange: realized,
        valueChange: -invest
      })
    }
  })

  events.sort((a,b)=>a.date-b.date)

  let cumProfit=0
  let cumValue=0

  const labels=[]
  const profitData=[]
  const valueData=[]

  events.forEach(e=>{
    cumProfit+=e.profitChange
    cumValue+=e.valueChange

    labels.push(e.date.toISOString().split("T")[0])
    profitData.push(cumProfit)
    valueData.push(cumValue)
  })

  if(timelineChart) timelineChart.destroy()

  timelineChart = new Chart(
    document.getElementById("timelineChart"),
    {
      type:"line",
      data:{
        labels:labels,
        datasets:[
          {
            label:"Cumulative Profit",
            data:profitData,
            borderColor:"#4ade80",
            tension:0.3
          },
          {
            label:"Portfolio Value",
            data:valueData,
            borderColor:"#d4af37",
            tension:0.3
          }
        ]
      },
      options:{responsive:true}
    }
  )
}

function renderActiveTable(items){
  const tbody=document.getElementById("activeBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.quantity}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td>
          <button onclick="sellItem('${i.id}')">💰</button>
        </td>
        <td>
          <button onclick="deleteItem('${i.id}')">❌</button>
        </td>
      </tr>
    `
  })
}

function renderSoldTable(items){
  const tbody=document.getElementById("soldBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const realized=(i.sold_price-i.purchase_price)*i.quantity

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>€ ${i.sold_price}</td>
        <td>€ ${i.purchase_price}</td>
        <td class="${realized>=0?'green':'red'}">
          € ${realized.toLocaleString()}
        </td>
        <td>${i.sold_date ? i.sold_date.split("T")[0] : ""}</td>
      </tr>
    `
  })
}

async function sellItem(id){
  const soldPrice = prompt("Enter selling price:")
  if(!soldPrice) return

  await fetch('/api/sell-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:id,
      sold_price:Number(soldPrice)
    })
  })

  loadData()
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

loadData()

</script>

</body>
</html>
