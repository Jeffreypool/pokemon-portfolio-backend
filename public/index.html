<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      padding: 50px 60px;
      background: radial-gradient(circle at top, #11151c, #0b0e13 70%);
      font-family: Inter, sans-serif;
      color: #e5e7eb;
    }

    h1 {
      text-align:center;
      letter-spacing:2px;
      opacity:0.8;
      margin-bottom:40px;
    }

    .hero {
      text-align:center;
      margin-bottom:50px;
    }

    .hero-value {
      font-size:64px;
      font-weight:700;
      color:#22c55e;
      text-shadow: 0 0 15px rgba(34,197,94,0.5);
    }

    .hero-sub {
      margin-top:12px;
      font-size:16px;
      opacity:0.7;
    }

    .kpi-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .kpi-card {
      background:#161a22;
      border:1px solid #1f2937;
      border-radius:12px;
      padding:20px;
    }

    .kpi-title { font-size:13px; opacity:0.6; }
    .kpi-value { font-size:22px; font-weight:600; margin-top:6px; }

    .card {
      background:#161a22;
      padding:20px;
      border-radius:12px;
      border:1px solid #1f2937;
      margin-bottom:25px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      padding:10px 8px;
      border-bottom:1px solid #1f2937;
    }

    th { color:#9ca3af; }

    .right { text-align:right; }
    .center { text-align:center; }

    input {
      padding:6px 8px;
      background:#0f1115;
      color:#e5e7eb;
      border:1px solid #2a3240;
      border-radius:6px;
      margin-right:8px;
      margin-bottom:8px;
    }

    button {
      padding:6px 10px;
      border-radius:6px;
      border:none;
      background:#d4af37;
      color:black;
      font-weight:600;
      cursor:pointer;
    }

    .green { color:#22c55e; }
    .red { color:#ef4444; }

    canvas { max-height:170px !important; }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="hero">
  <div id="totalValueHero" class="hero-value"></div>
  <div id="heroSubline" class="hero-sub"></div>
</div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-title">Active Holdings</div>
    <div id="activeValueKPI" class="kpi-value"></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">Realized Gains</div>
    <div id="realizedValueKPI" class="kpi-value"></div>
  </div>
  <div class="kpi-card">
    <div class="kpi-title">Total ROI</div>
    <div id="totalROIKPI" class="kpi-value"></div>
  </div>
</div>

<div class="card">
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <canvas id="lineChart"></canvas>
</div>

<div class="card">
  <canvas id="donutChart"></canvas>
</div>

<div class="card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input id="product_type" placeholder="Product Type" />
    <button type="submit">Add</button>
  </form>
</div>

<div class="card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="center">Qty</th>
        <th class="right">Investment</th>
        <th class="right">Current</th>
        <th class="right">Profit</th>
        <th class="center">Sell</th>
        <th class="center">Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="right">Sold Price</th>
        <th class="right">Investment</th>
        <th class="right">Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let allItems=[]
let barChart,lineChart,donutChart

async function loadData(){
  const res=await fetch('/api/dashboard')
  const data=await res.json()
  allItems=data.items
  render()
}

function render(){
  const active=allItems.filter(i=>!i.sold)
  const sold=allItems.filter(i=>i.sold)

  renderStats(active,sold)
  renderTables(active,sold)
  renderBarChart(active)
  renderLineChart(active)
  renderDonutChart(active)
}

function renderStats(active,sold){
  const invest=active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current=active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized=current-invest
  const realized=sold.reduce((s,i)=>s+((i.sold_price-i.purchase_price)*i.quantity),0)
  const totalProfit=unrealized+realized
  const totalROI=invest>0?((totalProfit/invest)*100).toFixed(2):0
  const soldValue=sold.reduce((s,i)=>s+(i.sold_price*i.quantity),0)

  document.getElementById("totalValueHero").innerHTML="€ "+current.toLocaleString()
  document.getElementById("heroSubline").innerHTML=
    `<span class="${totalProfit>=0?'green':'red'}">
      € ${totalProfit.toLocaleString()}
    </span> • ${totalROI}% ROI`

  document.getElementById("activeValueKPI").innerHTML="€ "+current.toLocaleString()
  document.getElementById("realizedValueKPI").innerHTML="€ "+soldValue.toLocaleString()
  document.getElementById("totalROIKPI").innerHTML=totalROI+"%"
}

function renderTables(active,sold){
  const body=document.getElementById("activeBody")
  body.innerHTML=""

  active.forEach(i=>{
    const invest=i.purchase_price*i.quantity
    const current=i.current_price*i.quantity
    const profit=current-invest

    body.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td class="center">${i.quantity}</td>
        <td class="right">€ ${invest.toLocaleString()}</td>
        <td class="right">€ ${current.toLocaleString()}</td>
        <td class="right ${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td class="center"><button onclick="sellItem('${i.id}')">💰</button></td>
        <td class="center"><button onclick="deleteItem('${i.id}')">❌</button></td>
      </tr>`
  })

  const soldBody=document.getElementById("soldBody")
  soldBody.innerHTML=""

  sold.forEach(i=>{
    const realized=(i.sold_price-i.purchase_price)*i.quantity
    soldBody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td class="right">€ ${i.sold_price}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right ${realized>=0?'green':'red'}">
          € ${realized.toLocaleString()}
        </td>
        <td>${i.sold_date?.split("T")[0]||""}</td>
      </tr>`
  })
}

function renderBarChart(active){
  const invest=active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current=active.reduce((s,i)=>s+i.current_price*i.quantity,0)

  if(barChart) barChart.destroy()

  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"]
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })
}

function renderLineChart(active){
  const dates=active.map(i=>i.purchase_date?.split("T")[0]||"")
  const values=active.map(i=>i.current_price*i.quantity)

  if(lineChart) lineChart.destroy()

  lineChart=new Chart(document.getElementById("lineChart"),{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        data:values,
        borderColor:"#22c55e",
        backgroundColor:"rgba(34,197,94,0.15)",
        fill:true,
        tension:0.4
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })
}

function renderDonutChart(active){
  const grouped={}
  active.forEach(i=>{
    const value=i.current_price*i.quantity
    const type=i.product_type||"Other"
    if(!grouped[type]) grouped[type]=0
    grouped[type]+=value
  })

  const labels=Object.keys(grouped)
  const values=Object.values(grouped)

  if(donutChart) donutChart.destroy()

  donutChart=new Chart(document.getElementById("donutChart"),{
    type:"doughnut",
    data:{
      labels,
      datasets:[{
        data:values,
        backgroundColor:["#22c55e","#d4af37","#3b82f6","#ef4444","#8b5cf6","#14b8a6"],
        borderWidth:0
      }]
    },
    options:{
      cutout:"70%",
      plugins:{legend:{position:"bottom"}}
    }
  })
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()

  const body={
    name:document.getElementById("name").value,
    quantity:Number(document.getElementById("quantity").value),
    purchase_price:Number(document.getElementById("purchase_price").value),
    current_price:Number(document.getElementById("current_price").value),
    product_type:document.getElementById("product_type").value,
    purchase_date:new Date().toISOString()
  }

  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })

  e.target.reset()
  loadData()
})

loadData()

</script>

</body>
</html>
