<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      padding: 40px;
      background: #0f172a;
      color: #f8fafc;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 40px;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .metric {
      font-size: 28px;
      font-weight: 700;
      margin-top: 10px;
    }

    .sub {
      opacity: 0.6;
      font-size: 14px;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    select {
      padding: 8px 12px;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      border-radius: 8px;
      margin-right: 15px;
    }

    canvas {
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    th {
      font-weight: 600;
      opacity: 0.7;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tr:hover {
      background: #1e293b;
    }

    .profit-cell {
      font-weight: 600;
    }
  </style>
</head>

<body>

<h1>📊 Pokemon Investment Portfolio</h1>

<div class="grid">
  <div class="card">
    <div class="sub">Total Investment</div>
    <div class="metric" id="totalInvestment"></div>
  </div>

  <div class="card">
    <div class="sub">Current Value</div>
    <div class="metric" id="currentValue"></div>
  </div>

  <div class="card">
    <div class="sub">Total Profit</div>
    <div class="metric" id="totalProfit"></div>
  </div>
</div>

<div class="card">
  <select id="typeFilter">
    <option value="">All Product Types</option>
  </select>

  <canvas id="portfolioChart" height="120"></canvas>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Set</th>
        <th>Qty</th>
        <th>Purchase €</th>
        <th>Current €</th>
        <th>Profit €</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
</div>

<script>
let chartInstance = null
let allItems = []

async function loadData() {
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  allItems = data.items
  populateFilter()
  render(allItems)
}

function populateFilter() {
  const select = document.getElementById('typeFilter')
  const types = [...new Set(allItems.map(i => i.product_type).filter(Boolean))]

  types.forEach(t => {
    select.innerHTML += `<option value="${t}">${t}</option>`
  })
}

function render(items) {

  const totalInvestment = items.reduce((sum,i)=>sum+i.purchase_price*i.quantity,0)
  const currentValue = items.reduce((sum,i)=>sum+i.current_price*i.quantity,0)
  const profit = currentValue-totalInvestment

  document.getElementById('totalInvestment').innerHTML = `€ ${totalInvestment.toLocaleString()}`
  document.getElementById('currentValue').innerHTML = `€ ${currentValue.toLocaleString()}`
  document.getElementById('totalProfit').innerHTML =
    `<span class="${profit>=0?'green':'red'}">€ ${profit.toLocaleString()}</span>`

  renderChart(totalInvestment,currentValue)
  renderTable(items)
}

function renderChart(invest,current) {
  const ctx = document.getElementById('portfolioChart')

  if(chartInstance) chartInstance.destroy()

  chartInstance = new Chart(ctx,{
    type:'bar',
    data:{
      labels:['Investment','Current Value'],
      datasets:[{
        data:[invest,current],
        backgroundColor:['#3b82f6','#22c55e'],
        borderRadius:12
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        y:{ticks:{color:'#94a3b8'}},
        x:{ticks:{color:'#94a3b8'}}
      }
    }
  })
}

function renderTable(items){
  const tbody=document.getElementById('itemsBody')
  tbody.innerHTML=''

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||''}</td>
        <td>${i.set_name||''}</td>
        <td>${i.quantity}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="profit-cell ${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
      </tr>
    `
  })
}

document.getElementById('typeFilter').addEventListener('change',function(){
  const type=this.value
  if(!type){render(allItems);return}
  render(allItems.filter(i=>i.product_type===type))
})

loadData()
</script>

</body>
</html>
