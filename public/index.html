<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
console.log("JS loaded")
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    body.fade-in {
      opacity: 1;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #d4af37;
    }

    .hero-number {
      font-size: 64px;
      font-weight: 700;
      position: relative;
      display: inline-block;
    }

    .gold-glow {
      text-shadow: 0 0 25px rgba(212,175,55,0.9);
    }

    .gold-glow::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(212,175,55,0.4), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      100% { left: 200%; }
    }

    .roi {
      font-size: 22px;
      margin-top: 10px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .section {
      margin-bottom: 40px;
      transform: translateY(30px);
      opacity: 0;
      transition: all 0.8s ease;
    }

    body.fade-in .section {
      transform: translateY(0);
      opacity: 1;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
    }

    canvas {
      max-height: 180px !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    input, select {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }

    .manage-toggle {
      margin-top: 30px;
      cursor: pointer;
      color: #d4af37;
      font-size: 14px;
    }

    .manage-section {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    .manage-section.open {
      max-height: 4000px;
      margin-top: 30px;
    }

    body.presentation .manage-toggle,
    body.presentation .manage-section {
      display: none;
    }

    .presentation-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #d4af37;
      color: black;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      z-index: 999;
    }

    .exit-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #444;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      z-index: 999;
    }

    body.presentation .exit-btn {
      display: block;
    }

  </style>
</head>

<body>

<button class="presentation-btn" onclick="enterPresentation()">Presentation Mode</button>
<button class="exit-btn" onclick="exitPresentation()">Exit</button>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="section">
  <div>Total Portfolio Value</div>
  <div id="portfolioValue" class="hero-number"></div>
  <div id="roiDisplay" class="roi"></div>
</div>

<div class="section card">
  <canvas id="valueChart"></canvas>
</div>

<div class="manage-toggle" onclick="toggleManage()">
  ⚙ Manage Portfolio
</div>

<div id="manageSection" class="manage-section">

  <div class="card">
    <h3>Add Item</h3>
    <form id="itemForm">
      <input id="name" placeholder="Name" required />
      <input id="set" placeholder="Set" />
      <input id="condition" placeholder="Condition" />
      <input id="quantity" type="number" value="1" required />
      <input id="purchase_price" type="number" placeholder="Purchase €" required />
      <input id="current_price" type="number" placeholder="Current €" required />
      <select id="product_type">
        <option>Booster Box</option>
        <option>ETB</option>
        <option>Loose Pack</option>
        <option>Single Card</option>
      </select>
      <button>Add</button>
    </form>
  </div>

  <div class="card">
    <h3>Portfolio Table</h3>
    <table>
      <thead>
        <tr>
          <th>Asset</th>
          <th>Type</th>
          <th>Investment</th>
          <th>Current</th>
          <th>Profit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
  </div>

</div>

<script>
let allItems = []
let valueChart

function enterPresentation(){
  document.body.classList.add("presentation")
  document.body.classList.add("fade-in")
  document.documentElement.requestFullscreen()
}

function exitPresentation(){
  document.body.classList.remove("presentation")
  document.body.classList.remove("fade-in")
  document.exitFullscreen()
}

function toggleManage(){
  document.getElementById("manageSection").classList.toggle("open")
}

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  render(allItems)
}

function render(items){

  const invest = items.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = items.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const profit = current-invest
  const roi = ((profit/invest)*100).toFixed(2)

  const valueEl = document.getElementById("portfolioValue")
  valueEl.innerHTML = "€ " + current.toLocaleString()

  if(roi > 100){
    valueEl.classList.add("gold-glow")
  }

  document.getElementById("roiDisplay").innerHTML =
    `<span class="${profit>=0?'green':'red'}">ROI ${roi}%</span>`

  if(valueChart) valueChart.destroy()

  valueChart = new Chart(document.getElementById("valueChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })

  renderTable(items)
}

function renderTable(items){
  const tbody=document.getElementById("itemsBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||""}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td>
          <button onclick="deleteItem('${i.id}')">❌</button>
        </td>
      </tr>
    `
  })
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()

  const body = {
    name: document.getElementById("name").value,
    set_name: document.getElementById("set").value,
    condition: document.getElementById("condition").value,
    quantity: Number(document.getElementById("quantity").value),
    purchase_price: Number(document.getElementById("purchase_price").value),
    current_price: Number(document.getElementById("current_price").value),
    product_type: document.getElementById("product_type").value
  }

  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })

  e.target.reset()
  loadData()
})

loadData()
</script>

</body>
</html>
