<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 60px;
      color: #d4af37;
    }

    .hero-number {
      font-size: 56px;
      font-weight: 700;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .gold-glow {
      text-shadow: 0 0 15px rgba(212,175,55,0.6);
    }

    .roi {
      font-size: 20px;
      margin-top: 8px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .section {
      margin-bottom: 60px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    canvas {
      max-height: 220px !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.85;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 1px;
    }

    tr:hover {
      background: rgba(212,175,55,0.05);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #333;
    }

    .badge.gold {
      border-color: #d4af37;
      color: #d4af37;
    }

    .badge.green {
      border-color: #4ade80;
      color: #4ade80;
    }

    .badge.red {
      border-color: #f87171;
      color: #f87171;
    }

  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="section">
  <div>Total Portfolio Value</div>
  <div id="portfolioValue" class="hero-number"></div>
  <div id="roiDisplay" class="roi"></div>
</div>

<div class="section card">
  <canvas id="valueChart"></canvas>
</div>

<div class="section card">
  <canvas id="growthChart"></canvas>
</div>

<div class="section card">
  <h3>Top Performing Asset</h3>
  <div id="topAsset"></div>
</div>

<div class="section card">
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Type</th>
        <th>Investment</th>
        <th>Current</th>
        <th>Profit</th>
        <th>Performance</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
</div>

<script>
let valueChart, growthChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  render(data.items)
}

function animateNumber(element, target){
  let start = 0
  const duration = 1200
  const step = target / (duration / 16)

  function update(){
    start += step
    if(start >= target){
      element.innerHTML = "€ " + target.toLocaleString()
      return
    }
    element.innerHTML = "€ " + Math.floor(start).toLocaleString()
    requestAnimationFrame(update)
  }
  update()
}

function render(items){

  const totalInvestment = items.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const totalCurrent = items.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const profit = totalCurrent-totalInvestment
  const roi = ((profit/totalInvestment)*100).toFixed(2)

  const portfolioEl = document.getElementById("portfolioValue")
  animateNumber(portfolioEl,totalCurrent)

  if(roi>100) portfolioEl.classList.add("gold-glow")

  document.getElementById("roiDisplay").innerHTML =
    `<span class="${profit>=0?'green':'red'}">ROI ${roi}%</span>`

  renderValueChart(totalInvestment,totalCurrent)
  renderGrowthChart(totalInvestment,totalCurrent)
  renderTable(items)
  renderTopAsset(items)
}

function renderValueChart(invest,current){
  if(valueChart) valueChart.destroy()

  valueChart = new Chart(document.getElementById("valueChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{y:{ticks:{color:"#888"}},x:{ticks:{color:"#888"}}}
    }
  })
}

function renderGrowthChart(invest,current){
  if(growthChart) growthChart.destroy()

  const fakeMonths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
  const growthData = fakeMonths.map((m,i)=> invest + ((current-invest)/12)*i)

  growthChart = new Chart(document.getElementById("growthChart"),{
    type:"line",
    data:{
      labels:fakeMonths,
      datasets:[{
        data:growthData,
        borderColor:"#d4af37",
        tension:0.3
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{y:{ticks:{color:"#888"}},x:{ticks:{color:"#888"}}}
    }
  })
}

function renderTopAsset(items){
  let best = null
  let bestROI = -999

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=(profit/(i.purchase_price*i.quantity))*100
    if(roi>bestROI){
      bestROI=roi
      best=i
    }
  })

  if(!best) return

  document.getElementById("topAsset").innerHTML = `
    <div style="font-size:18px;">
      ${best.name}
      <span class="badge gold">
        ${bestROI.toFixed(1)}% ROI
      </span>
    </div>
  `
}

function renderTable(items){
  const tbody=document.getElementById("itemsBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=((profit/(i.purchase_price*i.quantity))*100).toFixed(1)

    let badgeClass="green"
    if(roi>150) badgeClass="gold"
    if(roi<0) badgeClass="red"

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||""}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td>
          <span class="badge ${badgeClass}">
            ${roi}% ROI
          </span>
        </td>
      </tr>
    `
  })
}

loadData()
</script>

</body>
</html>
