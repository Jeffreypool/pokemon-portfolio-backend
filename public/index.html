<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f2f4f8;
    }

    h1 {
      margin-bottom: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    th {
      background: #fafafa;
    }

    .profit {
      font-weight: bold;
      font-size: 18px;
    }

    .green { color: #2ecc71; }
    .red { color: #e74c3c; }

    select, input {
      padding: 8px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #3498db;
      color: white;
    }

    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>📈 Pokemon Portfolio</h1>

<div class="card">
  <h2>Summary</h2>
  <div id="summary"></div>
</div>

<div class="card">
  <h2>Filters</h2>
  <select id="setFilter">
    <option value="">All Sets</option>
  </select>

  <select id="typeFilter">
    <option value="">All Product Types</option>
  </select>
</div>

<div class="card">
  <h2>Portfolio Overview</h2>
  <canvas id="valueChart" height="100"></canvas>
  <canvas id="typeChart" height="100"></canvas>
</div>

<div class="card">
  <h2>Items</h2>
  <table id="itemsTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Set</th>
        <th>Type</th>
        <th>Qty</th>
        <th>Purchase €</th>
        <th>Current €</th>
        <th>Profit €</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let valueChart = null
let typeChart = null
let allItems = []

async function loadData() {
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  allItems = data.items

  populateFilters()
  applyFilters()
}

function populateFilters() {
  const setFilter = document.getElementById('setFilter')
  const typeFilter = document.getElementById('typeFilter')

  const sets = [...new Set(allItems.map(i => i.set_name).filter(Boolean))]
  const types = [...new Set(allItems.map(i => i.product_type).filter(Boolean))]

  setFilter.innerHTML = '<option value="">All Sets</option>'
  typeFilter.innerHTML = '<option value="">All Product Types</option>'

  sets.forEach(s => {
    setFilter.innerHTML += `<option value="${s}">${s}</option>`
  })

  types.forEach(t => {
    typeFilter.innerHTML += `<option value="${t}">${t}</option>`
  })
}

function applyFilters() {
  const setValue = document.getElementById('setFilter').value
  const typeValue = document.getElementById('typeFilter').value

  let filtered = allItems

  if (setValue) {
    filtered = filtered.filter(i => i.set_name === setValue)
  }

  if (typeValue) {
    filtered = filtered.filter(i => i.product_type === typeValue)
  }

  renderSummary(filtered)
  renderTable(filtered)
  renderCharts(filtered)
}

function renderSummary(items) {
  const summaryDiv = document.getElementById('summary')

  const totalPurchase = items.reduce((sum, i) => sum + (i.purchase_price * i.quantity), 0)
  const totalCurrent = items.reduce((sum, i) => sum + (i.current_price * i.quantity), 0)
  const profit = totalCurrent - totalPurchase
  const profitClass = profit >= 0 ? 'green' : 'red'

  summaryDiv.innerHTML = `
    <p>Total Items: ${items.length}</p>
    <p>Total Purchase Value: € ${totalPurchase.toLocaleString()}</p>
    <p>Total Current Value: € ${totalCurrent.toLocaleString()}</p>
    <p class="profit ${profitClass}">
      Total Profit: € ${profit.toLocaleString()}
    </p>
  `
}

function renderTable(items) {
  const tbody = document.querySelector('#itemsTable tbody')
  tbody.innerHTML = ''

  items.forEach(item => {
    const profit = (item.current_price - item.purchase_price) * item.quantity
    tbody.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.set_name || ''}</td>
        <td>${item.product_type || ''}</td>
        <td>${item.quantity}</td>
        <td>€ ${item.purchase_price}</td>
        <td>€ ${item.current_price}</td>
        <td>€ ${profit.toLocaleString()}</td>
      </tr>
    `
  })
}

function renderCharts(items) {

  const totalPurchase = items.reduce((sum, i) => sum + (i.purchase_price * i.quantity), 0)
  const totalCurrent = items.reduce((sum, i) => sum + (i.current_price * i.quantity), 0)

  const ctx1 = document.getElementById('valueChart')

  if (valueChart) valueChart.destroy()

  valueChart = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: ['Purchase Value', 'Current Value'],
      datasets: [{
        label: 'Portfolio €',
        data: [totalPurchase, totalCurrent],
        backgroundColor: ['#3498db', '#2ecc71'],
        borderRadius: 8
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      responsive: true
    }
  })

  // ---- PIE CHART PER PRODUCT TYPE ----

  const typeTotals = {}

  items.forEach(i => {
    if (!i.product_type) return
    const value = i.current_price * i.quantity
    typeTotals[i.product_type] = (typeTotals[i.product_type] || 0) + value
  })

  const ctx2 = document.getElementById('typeChart')

  if (typeChart) typeChart.destroy()

  typeChart = new Chart(ctx2, {
    type: 'doughnut',
    data: {
      labels: Object.keys(typeTotals),
      datasets: [{
        data: Object.values(typeTotals),
        backgroundColor: [
          '#e74c3c',
          '#9b59b6',
          '#f1c40f',
          '#1abc9c',
          '#34495e'
        ]
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom'
        }
      }
    }
  })
}

document.getElementById('setFilter').addEventListener('change', applyFilters)
document.getElementById('typeFilter').addEventListener('change', applyFilters)

loadData()
</script>

</body>
</html>
