<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #d4af37;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
    }

    .stat-title { font-size: 14px; opacity: 0.6; }
    .stat-value { font-size: 28px; font-weight: 700; margin-top: 6px; }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      cursor: pointer;
      color: #aaa;
      user-select: none;
    }

    th.active-sort { color: #d4af37; }

    .right { text-align: right; }
    .center { text-align: center; }

    input, select {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }

  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="stats">
  <div class="stat-card">
    <div class="stat-title">Active Portfolio Value</div>
    <div id="activeValue" class="stat-value"></div>
  </div>
  <div class="stat-card">
    <div class="stat-title">Unrealized Profit</div>
    <div id="unrealizedProfit" class="stat-value"></div>
  </div>
  <div class="stat-card">
    <div class="stat-title">Realized Profit</div>
    <div id="realizedProfit" class="stat-value"></div>
  </div>
</div>

<div class="card">
  <canvas id="barChart"></canvas>
</div>

<div class="card">
  <canvas id="timelineChart"></canvas>
</div>

<div class="card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="set" placeholder="Set" />
    <input id="condition" placeholder="Condition" />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input id="product_type" placeholder="Product Type" />
    <button>Add</button>
  </form>
</div>

<div class="card">
  <h3>Filter</h3>
  <select id="filterType">
    <option value="all">All</option>
  </select>
</div>

<div class="card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('name', this)">Asset</th>
        <th onclick="sortBy('product_type', this)">Type</th>
        <th onclick="sortBy('quantity', this)" class="center">Qty</th>
        <th onclick="sortBy('purchase_price', this)" class="right">Investment</th>
        <th onclick="sortBy('current_price', this)" class="right">Current</th>
        <th onclick="sortBy('profit', this)" class="right">Profit</th>
        <th onclick="sortBy('roi', this)" class="right">ROI</th>
        <th class="center">Sell</th>
        <th class="center">Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="right">Sold Price</th>
        <th class="right">Investment</th>
        <th class="right">Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let allItems = []
let barChart, timelineChart
let currentSort = null
let sortDirection = 1

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  populateFilter()
  render()
}

function populateFilter(){
  const types = [...new Set(allItems.map(i => i.product_type).filter(Boolean))]
  const select = document.getElementById("filterType")
  select.innerHTML = '<option value="all">All</option>'
  types.forEach(t => {
    select.innerHTML += `<option value="${t}">${t}</option>`
  })
}

function render(){

  const filter = document.getElementById("filterType").value
  let items = allItems

  if(filter !== "all"){
    items = items.filter(i => i.product_type === filter)
  }

  const active = items.filter(i => !i.sold)
  const sold = allItems.filter(i => i.sold)

  renderStats(active, sold)
  renderTables(active, sold)
  renderCharts(active)
}

function renderStats(active, sold){

  const invest = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = current - invest

  const realized = sold.reduce((s,i)=>{
    return s + ((i.sold_price - i.purchase_price) * i.quantity)
  },0)

  document.getElementById("activeValue").innerHTML = "€ " + current.toLocaleString()
  document.getElementById("unrealizedProfit").innerHTML =
    `<span class="${unrealized>=0?'green':'red'}">€ ${unrealized.toLocaleString()}</span>`
  document.getElementById("realizedProfit").innerHTML =
    `<span class="${realized>=0?'green':'red'}">€ ${realized.toLocaleString()}</span>`
}

function renderTables(active, sold){

  const activeBody = document.getElementById("activeBody")
  activeBody.innerHTML = ""

  active.forEach(i=>{
    const profit = (i.current_price-i.purchase_price)*i.quantity
    const roi = ((profit/(i.purchase_price*i.quantity))*100).toFixed(1)

    activeBody.innerHTML += `
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||""}</td>
        <td class="center">${i.quantity}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right">€ ${i.current_price}</td>
        <td class="right ${profit>=0?'green':'red'}">€ ${profit.toLocaleString()}</td>
        <td class="right">${roi}%</td>
        <td class="center"><button onclick="sellItem('${i.id}')">💰</button></td>
        <td class="center"><button onclick="deleteItem('${i.id}')">❌</button></td>
      </tr>
    `
  })

  const soldBody = document.getElementById("soldBody")
  soldBody.innerHTML = ""

  sold.forEach(i=>{
    const realized = (i.sold_price-i.purchase_price)*i.quantity

    soldBody.innerHTML += `
      <tr>
        <td>${i.name}</td>
        <td class="right">€ ${i.sold_price}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right ${realized>=0?'green':'red'}">€ ${realized.toLocaleString()}</td>
        <td>${i.sold_date ? i.sold_date.split("T")[0] : ""}</td>
      </tr>
    `
  })
}

function renderCharts(active){

  const invest = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = active.reduce((s,i)=>s+i.current_price*i.quantity,0)

  if(barChart) barChart.destroy()

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current Value"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })
}

function sortBy(field, element){

  if(currentSort === field){
    sortDirection *= -1
  } else {
    currentSort = field
    sortDirection = 1
  }

  allItems.sort((a,b)=>{

    if(field === 'profit'){
      const profitA = (a.current_price-a.purchase_price)*a.quantity
      const profitB = (b.current_price-b.purchase_price)*b.quantity
      return (profitA - profitB) * sortDirection
    }

    if(field === 'roi'){
      const roiA = ((a.current_price-a.purchase_price)/a.purchase_price)
      const roiB = ((b.current_price-b.purchase_price)/b.purchase_price)
      return (roiA - roiB) * sortDirection
    }

    if(a[field] < b[field]) return -1 * sortDirection
    if(a[field] > b[field]) return 1 * sortDirection
    return 0
  })

  render()
}

async function sellItem(id){
  const soldPrice = prompt("Enter selling price:")
  if(!soldPrice) return

  await fetch('/api/sell-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:id,
      sold_price:Number(soldPrice)
    })
  })

  loadData()
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()

  const body = {
    name: document.getElementById("name").value,
    set_name: document.getElementById("set").value,
    condition: document.getElementById("condition").value,
    quantity: Number(document.getElementById("quantity").value),
    purchase_price: Number(document.getElementById("purchase_price").value),
    current_price: Number(document.getElementById("current_price").value),
    product_type: document.getElementById("product_type").value,
    purchase_date: new Date().toISOString()
  }

  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })

  e.target.reset()
  loadData()
})

document.getElementById("filterType").addEventListener("change", render)

loadData()

</script>

</body>
</html>
