<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 50px 60px;
      background: radial-gradient(circle at top, #11151c, #0b0e13 70%);
      font-family: Inter, sans-serif;
      color: #e5e7eb;
    }

    h1 {
      text-align:center;
      letter-spacing:2px;
      opacity:0.8;
      margin-bottom:40px;
    }

    .hero {
      text-align:center;
      margin-bottom:50px;
    }

    .hero-value {
      font-size:64px;
      font-weight:700;
      color:#22c55e;
      text-shadow:
        0 0 8px rgba(34,197,94,0.6),
        0 0 20px rgba(34,197,94,0.4);
    }

    .hero-sub {
      margin-top:12px;
      font-size:16px;
      opacity:0.7;
    }

    .kpi-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .kpi-card {
      background:#161a22;
      border:1px solid #1f2937;
      border-radius:12px;
      padding:20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    .kpi-title {
      font-size:13px;
      opacity:0.6;
      margin-bottom:8px;
    }

    .kpi-value {
      font-size:22px;
      font-weight:600;
    }

    .kpi-sub {
      margin-top:8px;
      font-size:14px;
    }

    .chart-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
      gap:25px;
      margin-bottom:40px;
    }

    .chart-title {
      font-size:13px;
      opacity:0.6;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    .card {
      background:#161a22;
      padding:20px;
      border-radius:12px;
      border:1px solid #1f2937;
      margin-bottom:25px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      padding:10px 8px;
      border-bottom:1px solid #1f2937;
    }

    th { color:#9ca3af; }

    .right { text-align:right; }
    .center { text-align:center; }

    input, select {
      padding:6px 8px;
      background:#0f1115;
      color:#e5e7eb;
      border:1px solid #2a3240;
      border-radius:6px;
      margin-right:8px;
      margin-bottom:8px;
    }

    button {
      padding:6px 10px;
      border-radius:6px;
      border:none;
      background:#d4af37;
      color:black;
      font-weight:600;
      cursor:pointer;
    }

    .green { color:#22c55e; }
    .red { color:#ef4444; }

    canvas { max-height:170px !important; }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="hero">
  <div id="totalValueHero" class="hero-value"></div>
  <div id="heroSubline" class="hero-sub"></div>
</div>

<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-title">Active Holdings</div>
    <div id="activeValueKPI" class="kpi-value"></div>
    <div id="activeProfitKPI" class="kpi-sub"></div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Realized Gains</div>
    <div id="realizedValueKPI" class="kpi-value"></div>
    <div id="realizedProfitKPI" class="kpi-sub"></div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Total Performance</div>
    <div id="totalROIKPI" class="kpi-value"></div>
    <div id="totalProfitKPI" class="kpi-sub"></div>
  </div>
</div>

<div class="chart-grid">

  <div class="card">
    <div class="chart-title">Investment vs Current</div>
    <canvas id="barChart"></canvas>
  </div>

  <div class="card">
    <div class="chart-title">Portfolio Growth</div>
    <canvas id="lineChart"></canvas>
  </div>

  <div class="card">
    <div class="chart-title">Allocation</div>
    <canvas id="donutChart"></canvas>
  </div>

</div>

<div class="card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input list="productList" id="product_type" placeholder="Product Type" />
    <datalist id="productList"></datalist>
    <button>Add</button>
  </form>
</div>

<script>

let allItems = []
let barChart, lineChart, donutChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items
  render()
}

function render(){
  const active = allItems.filter(i=>!i.sold)
  const sold = allItems.filter(i=>i.sold)

  renderStats(active,sold)
  renderBarChart(active)
  renderLineChart(active)
  renderDonutChart(active)
}

function renderStats(active,sold){
  const invest = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = current-invest
  const realized = sold.reduce((s,i)=>s+((i.sold_price-i.purchase_price)*i.quantity),0)
  const totalProfit = unrealized + realized
  const totalROI = invest>0 ? ((totalProfit/invest)*100).toFixed(2) : 0
  const soldValue = sold.reduce((s,i)=>s+(i.sold_price*i.quantity),0)

  document.getElementById("totalValueHero").innerHTML = "€ " + current.toLocaleString()
  document.getElementById("heroSubline").innerHTML =
    `<span class="${totalProfit>=0?'green':'red'}">€ ${totalProfit.toLocaleString()}</span> • ${totalROI}% ROI`

  document.getElementById("activeValueKPI").innerHTML = "€ " + current.toLocaleString()
  document.getElementById("activeProfitKPI").innerHTML =
    `<span class="${unrealized>=0?'green':'red'}">€ ${unrealized.toLocaleString()}</span>`

  document.getElementById("realizedValueKPI").innerHTML = "€ " + soldValue.toLocaleString()
  document.getElementById("realizedProfitKPI").innerHTML =
    `<span class="${realized>=0?'green':'red'}">€ ${realized.toLocaleString()}</span>`

  document.getElementById("totalROIKPI").innerHTML = totalROI + "%"
  document.getElementById("totalProfitKPI").innerHTML =
    `<span class="${totalProfit>=0?'green':'red'}">€ ${totalProfit.toLocaleString()}</span>`
}

function renderBarChart(active){
  const invest=active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current=active.reduce((s,i)=>s+i.current_price*i.quantity,0)

  if(barChart) barChart.destroy()
  barChart=new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{labels:["Investment","Current"],datasets:[{data:[invest,current],backgroundColor:["#444","#d4af37"]}]},
    options:{plugins:{legend:{display:false}}}
  })
}

function renderLineChart(active){
  const dates = active.map(i => i.purchase_date?.split("T")[0] || "")
  const values = active.map(i => i.current_price * i.quantity)

  if(lineChart) lineChart.destroy()

  const ctx = document.getElementById("lineChart").getContext("2d")
  const gradient = ctx.createLinearGradient(0,0,0,300)
  gradient.addColorStop(0,"rgba(34,197,94,0.4)")
  gradient.addColorStop(1,"rgba(34,197,94,0)")

  lineChart=new Chart(ctx,{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        data:values,
        borderColor:"#22c55e",
        backgroundColor:gradient,
        fill:true,
        tension:0.4,
        borderWidth:3,
        pointRadius:0
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })
}

function renderDonutChart(active){
  const grouped={}
  active.forEach(item=>{
    const value=item.current_price*item.quantity
    const type=item.product_type||"Other"
    if(!grouped[type]) grouped[type]=0
    grouped[type]+=value
  })

  const labels=Object.keys(grouped)
  const values=Object.values(grouped)
  const total=values.reduce((a,b)=>a+b,0)

  if(donutChart) donutChart.destroy()

  donutChart=new Chart(document.getElementById("donutChart"),{
    type:"doughnut",
    data:{
      labels:labels,
      datasets:[{
        data:values,
        backgroundColor:["#22c55e","#d4af37","#3b82f6","#ef4444","#8b5cf6","#14b8a6"],
        borderWidth:0
      }]
    },
    options:{
      cutout:"70%",
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:function(context){
              const percentage=((context.raw/total)*100).toFixed(1)
              return `${context.label}: € ${context.raw.toLocaleString()} (${percentage}%)`
            }
          }
        }
      }
    }
  })
}

loadData()

</script>

</body>
</html>
