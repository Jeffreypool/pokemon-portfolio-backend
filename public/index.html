<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1c1c1c, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      letter-spacing: 2px;
      margin-bottom: 60px;
      color: #d4af37;
    }

    .hero {
      margin-bottom: 80px;
    }

    .big-number {
      font-size: 60px;
      font-weight: 700;
      margin-top: 10px;
    }

    .roi {
      font-size: 24px;
      margin-top: 15px;
      letter-spacing: 1px;
    }

    .gold {
      color: #d4af37;
    }

    .green {
      color: #4ade80;
    }

    .red {
      color: #f87171;
    }

    .section {
      margin-bottom: 80px;
    }

    canvas {
      margin-top: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 40px;
    }

    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #333;
    }

    th {
      color: #888;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tr:hover {
      background: rgba(212,175,55,0.05);
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: #222;
      border: 1px solid #333;
    }

    .badge.high {
      border-color: #d4af37;
      color: #d4af37;
    }

    .badge.medium {
      border-color: #4ade80;
      color: #4ade80;
    }

    .badge.low {
      border-color: #f87171;
      color: #f87171;
    }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="hero">
  <div>Total Portfolio Value</div>
  <div id="portfolioValue" class="big-number gold"></div>
  <div id="roiDisplay" class="roi"></div>
</div>

<div class="section">
  <canvas id="valueChart" height="120"></canvas>
</div>

<div class="section">
  <canvas id="breakdownChart" height="120"></canvas>
</div>

<div class="section">
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Type</th>
        <th>Investment</th>
        <th>Current</th>
        <th>Profit</th>
        <th>Performance</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
</div>

<script>
let valueChart = null
let breakdownChart = null

async function loadData() {
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  render(data.items)
}

function render(items) {

  const totalInvestment = items.reduce((sum,i)=>sum+i.purchase_price*i.quantity,0)
  const totalCurrent = items.reduce((sum,i)=>sum+i.current_price*i.quantity,0)
  const totalProfit = totalCurrent - totalInvestment
  const roi = ((totalProfit/totalInvestment)*100).toFixed(2)

  document.getElementById('portfolioValue').innerHTML =
    `€ ${totalCurrent.toLocaleString()}`

  document.getElementById('roiDisplay').innerHTML =
    `<span class="${roi>=0?'green':'red'}">ROI ${roi}%</span>`

  renderValueChart(totalInvestment,totalCurrent)
  renderBreakdownChart(items)
  renderTable(items)
}

function renderValueChart(invest,current){

  const ctx=document.getElementById('valueChart')

  if(valueChart) valueChart.destroy()

  valueChart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:['Investment','Current Value'],
      datasets:[{
        data:[invest,current],
        backgroundColor:['#444','#d4af37'],
        borderRadius:12
      }]
    },
    options:{
      plugins:{legend:{display:false}},
      scales:{
        y:{ticks:{color:'#aaa'}},
        x:{ticks:{color:'#aaa'}}
      }
    }
  })
}

function renderBreakdownChart(items){

  const totals={}
  items.forEach(i=>{
    if(!i.product_type)return
    totals[i.product_type]=(totals[i.product_type]||0)+(i.current_price*i.quantity)
  })

  const ctx=document.getElementById('breakdownChart')

  if(breakdownChart) breakdownChart.destroy()

  breakdownChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:Object.keys(totals),
      datasets:[{
        data:Object.values(totals),
        backgroundColor:[
          '#d4af37',
          '#555',
          '#888',
          '#333'
        ]
      }]
    },
    options:{
      plugins:{
        legend:{position:'bottom',labels:{color:'#aaa'}}
      }
    }
  })
}

function renderTable(items){

  const tbody=document.getElementById('itemsBody')
  tbody.innerHTML=''

  items.forEach(i=>{

    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=((profit/(i.purchase_price*i.quantity))*100).toFixed(1)

    let performance='medium'
    if(roi>150)performance='high'
    if(roi<0)performance='low'

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||''}</td>
        <td>€ ${i.purchase_price}</td>
        <td>€ ${i.current_price}</td>
        <td class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td>
          <span class="badge ${performance}">
            ${performance.toUpperCase()}
          </span>
        </td>
      </tr>
    `
  })
}

loadData()
</script>

</body>
</html>
