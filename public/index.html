<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #d4af37;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
    }

    .stat-title {
      font-size: 14px;
      opacity: 0.6;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .section { margin-bottom: 40px; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    canvas { max-height: 220px !important; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      color: #aaa;
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    .right { text-align: right; }
    .center { text-align: center; }

    input {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }
  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="stats">
  <div class="stat-card">
    <div class="stat-title">Active Portfolio Value</div>
    <div id="activeValue" class="stat-value"></div>
  </div>

  <div class="stat-card">
    <div class="stat-title">Unrealized Profit</div>
    <div id="unrealizedProfit" class="stat-value"></div>
  </div>

  <div class="stat-card">
    <div class="stat-title">Realized Profit</div>
    <div id="realizedProfit" class="stat-value"></div>
  </div>
</div>

<div class="section card">
  <canvas id="barChart"></canvas>
</div>

<div class="section card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <button>Add</button>
  </form>
</div>

<div class="section card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="center">Qty</th>
        <th class="right">Investment</th>
        <th class="right">Current</th>
        <th class="right">Profit</th>
        <th class="center">Sell</th>
        <th class="center">Delete</th>
      </tr>
    </thead>
    <tbody id="activeBody"></tbody>
  </table>
</div>

<div class="section card">
  <h3>Sold Items</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th class="right">Sold Price</th>
        <th class="right">Investment</th>
        <th class="right">Realized Profit</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody id="soldBody"></tbody>
  </table>
</div>

<script>

let barChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()

  const active = data.items.filter(i => !i.sold)
  const sold = data.items.filter(i => i.sold)

  render(active, sold)
}

function render(active, sold){

  const investActive = active.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const currentActive = active.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const unrealized = currentActive - investActive

  const realized = sold.reduce((s,i)=>{
    return s + ((i.sold_price - i.purchase_price) * i.quantity)
  },0)

  document.getElementById("activeValue").innerHTML =
    "€ " + currentActive.toLocaleString()

  document.getElementById("unrealizedProfit").innerHTML =
    `<span class="${unrealized>=0?'green':'red'}">
      € ${unrealized.toLocaleString()}
    </span>`

  document.getElementById("realizedProfit").innerHTML =
    `<span class="${realized>=0?'green':'red'}">
      € ${realized.toLocaleString()}
    </span>`

  if(barChart) barChart.destroy()

  barChart = new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current Value"],
      datasets:[{
        data:[investActive,currentActive],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })

  renderActiveTable(active)
  renderSoldTable(sold)
}

function renderActiveTable(items){
  const tbody=document.getElementById("activeBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td class="center">${i.quantity}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right">€ ${i.current_price}</td>
        <td class="right ${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td class="center">
          <button onclick="sellItem('${i.id}')">💰</button>
        </td>
        <td class="center">
          <button onclick="deleteItem('${i.id}')">❌</button>
        </td>
      </tr>
    `
  })
}

function renderSoldTable(items){
  const tbody=document.getElementById("soldBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const realized=(i.sold_price-i.purchase_price)*i.quantity

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td class="right">€ ${i.sold_price}</td>
        <td class="right">€ ${i.purchase_price}</td>
        <td class="right ${realized>=0?'green':'red'}">
          € ${realized.toLocaleString()}
        </td>
        <td>${i.sold_date ? i.sold_date.split("T")[0] : ""}</td>
      </tr>
    `
  })
}

async function sellItem(id){
  const soldPrice = prompt("Enter selling price:")
  if(!soldPrice) return

  await fetch('/api/sell-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id:id,
      sold_price:Number(soldPrice)
    })
  })

  loadData()
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()

  const body = {
    name: document.getElementById("name").value,
    quantity: Number(document.getElementById("quantity").value),
    purchase_price: Number(document.getElementById("purchase_price").value),
    current_price: Number(document.getElementById("current_price").value)
  }

  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })

  e.target.reset()
  loadData()
})

loadData()

</script>

</body>
</html>
