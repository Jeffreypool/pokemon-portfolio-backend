<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Investment Portfolio</title>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600;700&display=swap');

    body {
      margin: 0;
      padding: 60px;
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      font-family: 'Inter', sans-serif;
      color: #f5f5f5;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      letter-spacing: 2px;
      margin-bottom: 40px;
      color: #d4af37;
    }

    .hero-number {
      font-size: 54px;
      font-weight: 700;
    }

    .roi {
      font-size: 18px;
      margin-top: 8px;
    }

    .green { color: #4ade80; }
    .red { color: #f87171; }

    .section { margin-bottom: 40px; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 25px;
    }

    canvas {
      max-height: 160px !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      cursor: pointer;
      color: #aaa;
      user-select: none;
    }

    th:hover {
      color: #d4af37;
    }

    input, select {
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #d4af37;
      color: black;
      font-weight: 600;
    }

  </style>
</head>

<body>

<h1>POKEMON INVESTMENT PORTFOLIO</h1>

<div class="section">
  <div>Total Portfolio Value (Active)</div>
  <div id="portfolioValue" class="hero-number"></div>
  <div id="roiDisplay" class="roi"></div>
</div>

<div class="section card">
  <canvas id="valueChart"></canvas>
</div>

<div class="section card">
  <h3>Filter by Product Type</h3>
  <select id="filterType">
    <option value="all">All</option>
  </select>
</div>

<div class="section card">
  <h3>Add Item</h3>
  <form id="itemForm">
    <input id="name" placeholder="Name" required />
    <input id="set" placeholder="Set" />
    <input id="condition" placeholder="Condition" />
    <input id="quantity" type="number" value="1" required />
    <input id="purchase_price" type="number" placeholder="Purchase €" required />
    <input id="current_price" type="number" placeholder="Current €" required />
    <input id="product_type" list="productList" placeholder="Product Type" />
    <datalist id="productList"></datalist>
    <button>Add</button>
  </form>
</div>

<div class="section card">
  <h3>Active Portfolio</h3>
  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Type</th>
        <th>Qty</th>
        <th>Investment</th>
        <th>Current</th>
        <th>Profit</th>
        <th>ROI %</th>
        <th>Sell</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
</div>

<script>

let allItems = []
let valueChart

async function loadData(){
  const res = await fetch('/api/dashboard')
  const data = await res.json()
  allItems = data.items.filter(i => !i.sold) // alleen actieve items
  populateProductTypes()
  applyFilter()
}

function populateProductTypes(){
  const types = [...new Set(allItems.map(i => i.product_type).filter(Boolean))]
  const filterSelect = document.getElementById("filterType")
  filterSelect.innerHTML = '<option value="all">All</option>'
  types.forEach(type => {
    filterSelect.innerHTML += `<option value="${type}">${type}</option>`
  })
}

function applyFilter(){
  const selected = document.getElementById("filterType").value
  let filtered = allItems
  if(selected !== "all"){
    filtered = allItems.filter(i => i.product_type === selected)
  }
  render(filtered)
}

function render(items){

  const invest = items.reduce((s,i)=>s+i.purchase_price*i.quantity,0)
  const current = items.reduce((s,i)=>s+i.current_price*i.quantity,0)
  const profitTotal = current-invest
  const roiTotal = invest > 0 ? ((profitTotal/invest)*100).toFixed(2) : 0

  document.getElementById("portfolioValue").innerHTML =
    "€ " + current.toLocaleString()

  document.getElementById("roiDisplay").innerHTML =
    `<span class="${profitTotal>=0?'green':'red'}">ROI ${roiTotal}%</span>`

  if(valueChart) valueChart.destroy()

  valueChart = new Chart(document.getElementById("valueChart"),{
    type:"bar",
    data:{
      labels:["Investment","Current"],
      datasets:[{
        data:[invest,current],
        backgroundColor:["#444","#d4af37"],
        borderRadius:8
      }]
    },
    options:{plugins:{legend:{display:false}}}
  })

  renderTable(items)
}

function renderTable(items){
  const tbody=document.getElementById("itemsBody")
  tbody.innerHTML=""

  items.forEach(i=>{
    const profit=(i.current_price-i.purchase_price)*i.quantity
    const roi=((profit/(i.purchase_price*i.quantity))*100).toFixed(1)

    tbody.innerHTML+=`
      <tr>
        <td>${i.name}</td>
        <td>${i.product_type||""}</td>
        <td style="text-align:center;">${i.quantity}</td>
        <td style="text-align:right;">€ ${i.purchase_price}</td>
        <td style="text-align:right;">€ ${i.current_price}</td>
        <td style="text-align:right;" class="${profit>=0?'green':'red'}">
          € ${profit.toLocaleString()}
        </td>
        <td style="text-align:right;">${roi}%</td>
        <td style="text-align:center;">
          <button onclick="sellItem('${i.id}')">💰</button>
        </td>
        <td style="text-align:center;">
          <button onclick="deleteItem('${i.id}')">❌</button>
        </td>
      </tr>
    `
  })
}

async function sellItem(id){
  const soldPrice = prompt("Enter selling price:")
  if(!soldPrice) return

  await fetch('/api/sell-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      id: id,
      sold_price: Number(soldPrice)
    })
  })

  loadData()
}

async function deleteItem(id){
  await fetch('/api/delete-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id})
  })
  loadData()
}

document.getElementById("itemForm").addEventListener("submit",async e=>{
  e.preventDefault()

  const body = {
    name: document.getElementById("name").value,
    set_name: document.getElementById("set").value,
    condition: document.getElementById("condition").value,
    quantity: Number(document.getElementById("quantity").value),
    purchase_price: Number(document.getElementById("purchase_price").value),
    current_price: Number(document.getElementById("current_price").value),
    product_type: document.getElementById("product_type").value
  }

  await fetch('/api/add-item',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })

  e.target.reset()
  loadData()
})

document.getElementById("filterType").addEventListener("change", applyFilter)

loadData()

</script>

</body>
</html>
